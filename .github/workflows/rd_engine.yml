name: RD Engine — Autonomous Cycles

on:
  schedule:
    - cron: '0 6 * * *'    # Cycle 1 — Harvest        (daily)
    - cron: '0 12 * * *'   # Cycle 2 — Physics+Market  (daily)
    - cron: '0 18 * * *'   # Cycle 3 — Kill Round      (daily)
    - cron: '0 23 * * *'   # Cycle 4 — Director        (daily)
    - cron: '0 0 * * 0'    # Weekly Maintenance         (Sunday 00:00 UTC)
  workflow_dispatch:
    inputs:
      cycle:
        description: 'Cycle number (1-4) — leave empty for auto-detect'
        required: false
        default: ''
      weekly:
        description: 'Run weekly maintenance (true/false)'
        required: false
        default: 'false'
      force_cold_start:
        description: 'Force cold start — DANGER: wipes today DB. Only use on day 1.'
        required: false
        default: 'false'
      force_run:
        description: 'Force run even if cycle already done today (bypass daily guard)'
        required: false
        default: 'false'
      profile:
        description: 'Research profile: all | chips | robotics | datacenter'
        required: false
        default: 'all'

jobs:
  determine_cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      cycle_number: ${{ steps.set_cycle.outputs.cycle }}
      is_weekly:    ${{ steps.set_cycle.outputs.is_weekly }}
    steps:
      - name: Determine what to run
        id: set_cycle
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.weekly }}" = "true" ]; then
              echo "is_weekly=true"  >> $GITHUB_OUTPUT
              echo "cycle=0"         >> $GITHUB_OUTPUT

            elif [ -n "${{ github.event.inputs.cycle }}" ]; then
              # Manual explicit cycle number provided
              echo "is_weekly=false" >> $GITHUB_OUTPUT
              echo "cycle=${{ github.event.inputs.cycle }}" >> $GITHUB_OUTPUT

            else
              # Auto-detect next cycle from UTC time when no cycle specified
              HOUR=$(date -u +%H)
              TOTAL_MIN=$(( 10#$HOUR * 60 + $(date -u +%M) ))
              echo "is_weekly=false" >> $GITHUB_OUTPUT
              if   [ "$TOTAL_MIN" -lt 690 ];  then echo "cycle=1" >> $GITHUB_OUTPUT
              elif [ "$TOTAL_MIN" -lt 1050 ]; then echo "cycle=2" >> $GITHUB_OUTPUT
              elif [ "$TOTAL_MIN" -lt 1350 ]; then echo "cycle=3" >> $GITHUB_OUTPUT
              else                                  echo "cycle=4" >> $GITHUB_OUTPUT
              fi
            fi

          else
            # Scheduled trigger
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            TOTAL_MIN=$(( 10#$HOUR * 60 + 10#$MINUTE ))
            DAY=$(date -u +%u)

            if [ "$TOTAL_MIN" -lt 60 ] && [ "$DAY" = "7" ]; then
              echo "is_weekly=true"  >> $GITHUB_OUTPUT
              echo "cycle=0"         >> $GITHUB_OUTPUT
            elif [ "$TOTAL_MIN" -ge 330 ] && [ "$TOTAL_MIN" -lt 480 ]; then
              echo "is_weekly=false" >> $GITHUB_OUTPUT
              echo "cycle=1"         >> $GITHUB_OUTPUT
            elif [ "$TOTAL_MIN" -ge 690 ] && [ "$TOTAL_MIN" -lt 840 ]; then
              echo "is_weekly=false" >> $GITHUB_OUTPUT
              echo "cycle=2"         >> $GITHUB_OUTPUT
            elif [ "$TOTAL_MIN" -ge 1050 ] && [ "$TOTAL_MIN" -lt 1200 ]; then
              echo "is_weekly=false" >> $GITHUB_OUTPUT
              echo "cycle=3"         >> $GITHUB_OUTPUT
            elif [ "$TOTAL_MIN" -ge 1350 ]; then
              echo "is_weekly=false" >> $GITHUB_OUTPUT
              echo "cycle=4"         >> $GITHUB_OUTPUT
            else
              # Unexpected trigger time — map strictly to nearest scheduled cycle
              # Cycle 1: 06:00 UTC (360min), Cycle 2: 12:00 UTC (720min)
              # Cycle 3: 18:00 UTC (1080min), Cycle 4: 23:00 UTC (1380min)
              if   [ "$TOTAL_MIN" -ge 330 ]  && [ "$TOTAL_MIN" -lt 660 ];  then echo "cycle=1" >> $GITHUB_OUTPUT
              elif [ "$TOTAL_MIN" -ge 660 ]  && [ "$TOTAL_MIN" -lt 990 ];  then echo "cycle=2" >> $GITHUB_OUTPUT
              elif [ "$TOTAL_MIN" -ge 990 ]  && [ "$TOTAL_MIN" -lt 1260 ]; then echo "cycle=3" >> $GITHUB_OUTPUT
              elif [ "$TOTAL_MIN" -ge 1260 ];                               then echo "cycle=4" >> $GITHUB_OUTPUT
              else
                # Before 05:30 UTC — this is a late Cycle 4 from previous day, skip
                echo "cycle=0" >> $GITHUB_OUTPUT
                echo "WARNING: Triggered before 05:30 UTC — skipping to avoid duplicate runs"
              fi
              echo "is_weekly=false" >> $GITHUB_OUTPUT
            fi
          fi

  run_engine:
    runs-on: ubuntu-latest
    needs: determine_cycle
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-hf-all-minilm-l6-v2-v1
          restore-keys: |
            ${{ runner.os }}-hf-all-minilm-l6-v2-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run physics gate tests (always)
        run: python main.py --test-physics

      - name: Run WEEKLY maintenance
        if: needs.determine_cycle.outputs.is_weekly == 'true'
        env:
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY:        ${{ secrets.SAMBANOVA_API_KEY }}
          FIREWORKS_API_KEY:        ${{ secrets.FIREWORKS_API_KEY }}
          MISTRAL_API_KEY:          ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY:           ${{ secrets.COHERE_API_KEY }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY:         ${{ secrets.CEREBRAS_API_KEY }}
          MODELS_TOKEN:             ${{ secrets.MODELS_TOKEN }}
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:             ${{ secrets.SUPABASE_KEY }}
          GITHUB_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN:                 ${{ secrets.HF_TOKEN }}
          SAM_GOV_API_KEY:          ${{ secrets.SAM_GOV_API_KEY }}
          LENS_API_KEY:             ${{ secrets.LENS_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          UNPAYWALL_EMAIL:          ${{ secrets.OPENALEX_EMAIL }}
          NASA_API_KEY:             ${{ secrets.NASA_API_KEY }}
        run: python main.py --weekly

      - name: Run cycle ${{ needs.determine_cycle.outputs.cycle_number }}
        if: needs.determine_cycle.outputs.is_weekly == 'false'
        env:
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY:        ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY:          ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY:           ${{ secrets.COHERE_API_KEY }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY:         ${{ secrets.CEREBRAS_API_KEY }}
          MODELS_TOKEN:             ${{ secrets.MODELS_TOKEN }}
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:             ${{ secrets.SUPABASE_KEY }}
          GITHUB_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN:                 ${{ secrets.HF_TOKEN }}
          LENS_API_KEY:             ${{ secrets.LENS_API_KEY }}
          UNPAYWALL_EMAIL:          ${{ secrets.OPENALEX_EMAIL }}
          NASA_API_KEY:             ${{ secrets.NASA_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          ARGS="--cycle ${{ needs.determine_cycle.outputs.cycle_number }}"

          # cold-start default is false — never wipe memory by accident
          if [ "${{ github.event.inputs.force_cold_start }}" = "true" ]; then
            ARGS="$ARGS --cold-start"
          fi

          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          # Research profile
          PROFILE="${{ github.event.inputs.profile }}"
          if [ -n "$PROFILE" ] && [ "$PROFILE" != "all" ]; then
            ARGS="$ARGS --profile $PROFILE"
          fi

          python main.py $ARGS

      - name: Commit summaries to git
        if: always()
        run: |
          git config user.name  "rd-engine-bot"
          git config user.email "bot@rd-engine"
          git add summaries/ config/seed.json || true
          git diff --staged --quiet || git commit -m "Auto: summaries $(date -u +%Y-%m-%d)"
          git push || true
