name: RD Engine — Autonomous Cycles

on:
  schedule:
    - cron: '0 6 * * *'    # Cycle 1 — Harvest        (daily)
    - cron: '0 12 * * *'   # Cycle 2 — Physics+Market  (daily)
    - cron: '0 18 * * *'   # Cycle 3 — Kill Round      (daily)
    - cron: '0 23 * * *'   # Cycle 4 — Director        (daily)
    - cron: '0 0 * * 0'    # Weekly Maintenance         (Sunday 00:00 UTC)
  workflow_dispatch:
    inputs:
      cycle:
        description: 'Cycle number (1-4) — leave empty for weekly'
        required: false
        default: '1'
      weekly:
        description: 'Run weekly maintenance (true/false)'
        required: false
        default: 'false'
      force_cold_start:
        description: 'Force cold start'
        required: false
        default: 'false'

jobs:
  determine_cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      cycle_number: ${{ steps.set_cycle.outputs.cycle }}
      is_weekly:    ${{ steps.set_cycle.outputs.is_weekly }}
    steps:
      - name: Determine what to run
        id: set_cycle
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.weekly }}" = "true" ]; then
              echo "is_weekly=true"  >> $GITHUB_OUTPUT
              echo "cycle=0"         >> $GITHUB_OUTPUT
            else
              echo "is_weekly=false" >> $GITHUB_OUTPUT
              echo "cycle=${{ github.event.inputs.cycle }}" >> $GITHUB_OUTPUT
            fi
          else
            HOUR=$(date -u +%H)
            DAY=$(date -u +%u)   # 7 = Sunday
            if [ "$HOUR" = "00" ] && [ "$DAY" = "7" ]; then
              echo "is_weekly=true"  >> $GITHUB_OUTPUT
              echo "cycle=0"         >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "06" ];  then echo "is_weekly=false" >> $GITHUB_OUTPUT && echo "cycle=1" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "12" ];  then echo "is_weekly=false" >> $GITHUB_OUTPUT && echo "cycle=2" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "18" ];  then echo "is_weekly=false" >> $GITHUB_OUTPUT && echo "cycle=3" >> $GITHUB_OUTPUT
            else                           echo "is_weekly=false" >> $GITHUB_OUTPUT && echo "cycle=4" >> $GITHUB_OUTPUT
            fi
          fi

  run_engine:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: determine_cycle
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          # Key includes model name — change key suffix to force a re-download if model changes
          key: ${{ runner.os }}-hf-all-minilm-l6-v2-v1
          restore-keys: |
            ${{ runner.os }}-hf-all-minilm-l6-v2-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run physics gate tests (always)
        run: python main.py --test-physics

      - name: Run WEEKLY maintenance
        if: needs.determine_cycle.outputs.is_weekly == 'true'
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY:   ${{ secrets.SAMBANOVA_API_KEY }}
          FIREWORKS_API_KEY:   ${{ secrets.FIREWORKS_API_KEY }}
          MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY:      ${{ secrets.COHERE_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
        run: python main.py --weekly

      - name: Run cycle ${{ needs.determine_cycle.outputs.cycle_number }}
        if: needs.determine_cycle.outputs.is_weekly == 'false'
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY:   ${{ secrets.SAMBANOVA_API_KEY }}
          FIREWORKS_API_KEY:   ${{ secrets.FIREWORKS_API_KEY }}
          MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY:      ${{ secrets.COHERE_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--cycle ${{ needs.determine_cycle.outputs.cycle_number }}"
          if [ "${{ github.event.inputs.force_cold_start }}" = "true" ]; then
            ARGS="$ARGS --cold-start"
          fi
          python main.py $ARGS

      - name: Commit summaries to git
        if: always()
        run: |
          git config user.name  "rd-engine-bot"
          git config user.email "bot@rd-engine"
          git add summaries/ config/seed.json || true
          git diff --staged --quiet || git commit -m "Auto: summaries $(date -u +%Y-%m-%d)"
          git push || true
